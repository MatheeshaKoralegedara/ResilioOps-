alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'discord-notifications'
    receivers:
    - name: 'discord-notifications'
      discord_configs:
      - webhook_url: 'https://discordapp.com/api/webhooks/1510889381668589638/F0CqKvFW8G3KHRp9M34lKKmW8T3swFV0Ba29MyvNKEGh8PtlKfkc7ydL3aq8F1jGdN2J'
        send_resolved: true
        title: '🚨 [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        message: |-
          **Alert:** {{ .CommonAnnotations.summary }}
          **Severity:** {{ .CommonLabels.severity }}
          **Description:** {{ .CommonAnnotations.description }}