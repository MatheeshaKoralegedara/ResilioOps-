USER-SUPPLIED VALUES:
alertmanager:
  config:
    global:
      resolve_timeout: 5m
    receivers:
    - discord_configs:
      - message: |-
          **Alert:** {{ .CommonAnnotations.summary }}
          **Severity:** {{ .CommonLabels.severity }}
          **Description:** {{ .CommonAnnotations.description }}
        send_resolved: true
        title: "\U0001F6A8 [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        webhook_url: https://discordapp.com/api/webhooks/1510889381668589638/F0CqKvFW8G3KHRp9M34lKKmW8T3swFV0Ba29MyvNKEGh8PtlKfkc7ydL3aq8F1jGdN2J
      name: discord-notifications
    route:
      group_by:
      - alertname
      - cluster
      - service
      group_interval: 5m
      group_wait: 30s
      receiver: discord-notifications
      repeat_interval: 12h
      routes:
      - match:
          severity: critical
        receiver: discord-notifications
